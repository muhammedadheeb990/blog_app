{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

<h3>Edit Comment</h3>

<form method="POST">
    {% csrf_token %}

    <textarea name="comment" class="form-control" rows="4">
{{ comment.comment }}
    </textarea>

    <button type="submit" class="btn btn-warning mt-2">
        Update Comment
    </button>

</form>

</div>

{% endblock %}
